on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for release'
        required: true
      prerelease:
        description: 'Publish as pre-release'
        type: boolean
        required: true
        default: false

jobs:
  publish-opam-package:
    uses: ./.github/workflows/publish-opam-package.yml
    with:
      tag: ${{ inputs.tag }}
      prerelease: ${{ inputs.prerelease }}
    secrets: inherit
