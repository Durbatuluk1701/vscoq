name: Publish opam package

on:
  release:
    types:
    - released
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for release'
        required: true
      prerelease:
        description: 'Publish as pre-release'
        type: boolean
        required: true
        default: false

jobs:
  publish-opam-package:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: 4.14.x

    - name: Install opam-publish
      run: opam install -y -j 2 opam-publish=2.7.1

    - name: Publish on opam
      env:
        OPAM_PUBLISH_GH_TOKEN: ${{ secrets.OPAM_PUBLISH_TOKEN }}
        VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
        PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || github.event.release.prerelease }}
      run: |
        eval $(opam env)
        VERSION_SLUG="$VERSION_TAG"
        VERSION="${VERSION_SLUG#v}"
        TARBALL_URL="https://github.com/rocq-prover/vsrocq/releases/download/$VERSION_SLUG/vsrocq-language-server-$VERSION.tar.gz"
        cd language-server
        git config --global user.name vscoqbot
        git config --global user.email vscoqbot@inria.fr
        if [ "$PRERELEASE" = "true" ]; then
          opam publish --no-confirmation --no-browser \
            --packages-directory=extra-dev/packages --repo=rocq-prover/opam \
            -v "$VERSION" "$TARBALL_URL" vsrocq-language-server.opam vscoq-language-server.opam
        else
          opam publish --no-confirmation --no-browser \
            -v "$VERSION" "$TARBALL_URL" vsrocq-language-server.opam vscoq-language-server.opam
        fi
